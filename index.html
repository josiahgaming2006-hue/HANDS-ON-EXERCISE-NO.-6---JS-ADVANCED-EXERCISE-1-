<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Web Output #1</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        td {
            padding: 5px;
        }
        button {
            margin-right: 5px;
            margin-top: 5px;
        }
        #btn4,
        #btnHighest,
        #btnLowest {
            display: none;
        }
        button[type="button"] {
            margin-right: 5px;
            margin-top: 5px;
        }
        button {
            margin-right: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1>Javascript Web Output #1</h1>

<table>
    <tr>
        <td>
            <label for="txtNum">Insert any Positive Numbers:</label>
        </td>
        <td>
            <input type="text" id="txtNum" placeholder="Enter a positive number">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <button id="btn1">Insert</button>
            <button id="btn2">Clear</button>
            
        </td>
    </tr>
</table>

<br>

<fieldset>
    <legend>Inserted Numbers</legend>
    <table id="tblNumbers"></table>
</fieldset>

<br>
<button id="btn3">Clear Items</button>
<button id="btnSortAsc">Sort Ascending</button>
<button id="btnSortDesc">Sort Descending</button>
<button id="btn4" style="display:none;">Get Total</button>
<button id="btnHighest" style="display:none;">Get Highest</button>
<button id="btnLowest" style="display:none;">Get Lowest</button>

<script src="main.js"></script>

</body>
</html>
